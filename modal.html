<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Descripción concisa de la página.">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Mi portfolio">
    <meta property="og:description" content="A small project for future pages">
    <meta property="og:image" content="">
    <title>Lit Element + JavasCript</title>
    <link rel="shortcut icon" href="icons/sunflower.svg" type="image/x-icon">
    <link rel="stylesheet" href="css/app.min.css">
    <script src="js/index.min.js" type="module"></script>
</head>

<body>
    <div class="flex h-screen">
        <aside class="w-64 bg-gray-800 text-white flex flex-col p-4 space-y-4">
            <h2 class="text-xl font-bold">Menú</h2>
            <nav class="flex flex-col space-y-2">
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Inicio</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Perfil</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Ajustes</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Salir</a>
            </nav>
        </aside>
        <main class="flex-1 bg-gray-100 dark:bg-gray-700 p-6">
            <section class="p-4">
                <form class="p-6 rounded shadow space-y-4">
                    <h2 class="text-xl font-bold mb-4 dark:text-white">Formulario de Registro</h2>
                    <div>
                        <label for="first_name" class="form-label">First name</label>
                        <input type="text" id="first_name" class="form-input" placeholder="John" required />
                    </div>
                    <div>
                        <label for="correo_contacto" class="form-label">Correo</label>
                        <input type="email" id="correo_contacto" name="correo_contacto" class="form-input" />
                    </div>
                    <div>
                        <label for="telefono_contacto" class="form-label">Teléfono</label>
                        <input type="tel" id="telefono_contacto" name="telefono_contacto" class="form-input" />
                    </div>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                        Enviar
                    </button>
                </form>
            </section>
        </main>
    </div>

</body>

</html>
