<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Descripción concisa de la página.">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Mi portfolio">
    <meta property="og:description" content="A small project for future pages">
    <meta property="og:image" content="">
    <title>Dashboard</title>
    <link rel="shortcut icon" href="icons/sunflower.svg" type="image/x-icon">
    <link rel="stylesheet" href="public/css/app.min.css">
    <script src="public/js/index.min.js" type="module"></script>
</head>

<body>
    <edit-modal></edit-modal>
    <div class="flex md:flex-row flex-col h-screen">
        <aside class="md:w-64 bg-gray-800 text-white flex flex-col p-4 space-y-4">
            <h2 class="text-xl font-bold">Menú</h2>
            <nav class="flex flex-col space-y-2">
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Inicio</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Perfil</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Ajustes</a>
                <a href="#" class="hover:bg-gray-700 p-2 rounded">Salir</a>
            </nav>
        </aside>
        <main class="flex-1 bg-gray-100 dark:bg-gray-900 p-6">
            <section class="p-4">
                <div class="relative overflow-x-auto shadow-md rounded-lg">
                    <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                            <tr>
                                <th scope="col" class="px-6 py-3">
                                    Product name
                                </th>
                                <th scope="col" class="px-6 py-3">
                                    Color
                                </th>
                                <th scope="col" class="px-6 py-3">
                                    Category
                                </th>
                                <th scope="col" class="px-6 py-3">
                                    Price
                                </th>
                                <th scope="col" class="px-6 py-3">
                                    Action
                                </th>
                            </tr>
                        </thead>
                        <tbody id="product-list">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

</body>

</html>
