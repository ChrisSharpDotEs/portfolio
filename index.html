<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not available</title>
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="flex justify-center items-center min-h-screen">
        <div id="content" class="text-center p-4">
            <p class="text-lg font-bold p-4">Para ver mi proyecto</p>
            <button class="focus:ring-4 focus:outline-none rounded-lg text-sm sm:w-auto px-5 py-2.5 text-center min-w-[100px] text-white font-bold bg-blue-400 hover:bg-blue-500 focus:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 cursor-pointer">Pulse aquí</button>
        </div>
    </div>
    <script>
        const button = document.querySelector('button');
        const content = document.getElementById('content');
        button.addEventListener('click', () => {
            const x = parseInt(Math.random() * window.innerWidth) + 'px';
            const y = parseInt(Math.random() * window.innerHeight) + 'px';
            
            console.log(y, window.innerHeight);
            content.style.position = 'absolute';
            content.style.left = x
            content.style.top = y
        });
    </script>
</body>

</html>
